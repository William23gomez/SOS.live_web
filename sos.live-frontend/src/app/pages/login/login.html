 <section class="login-section">
    <a routerLink="/home" class="back-circle">
      <i class="bi bi-arrow-left"></i>
    </a>

    <div class="overlay"></div>

    <div class="container h-100">
      <div class="row align-items-center h-100">
        <div class="col-lg-6 text-white left-content">
          <h2 class="fw-bold mb-4">Bienvenido a SOS.LIVE</h2>
          <p class="mb-4">Si no tienes una cuenta, registrate aqui.</p>
          <a routerLink="/register" class="btn btn-gold px-4">Registrarse</a>
        </div>

        <div class="col-lg-6 d-flex justify-content-center">
          <form class="login-card" (ngSubmit)="onSubmit()">
            <h2 class="text-center mb-4 fw-bold text-white">Iniciar Sesion</h2>

            <div
              *ngIf="feedbackMessage"
              class="status-banner"
              [class.status-error]="feedbackType === 'error'"
              [class.status-success]="feedbackType === 'success'">
              {{ feedbackMessage }}
            </div>

            <div class="mb-3 position-relative">
              <i class="bi bi-person-fill input-icon"></i>
              <input id="loginEmail" name="loginEmail" type="email" class="form-control custom-input" placeholder="Correo" [(ngModel)]="formData.email" required>
            </div>

            <div class="mb-4 position-relative">
              <i class="bi bi-lock-fill input-icon"></i>
              <input id="loginPassword" name="loginPassword" type="password" class="form-control custom-input" placeholder="Contrasena" [(ngModel)]="formData.password" required>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-gold px-4" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Ingresando...' : 'Iniciar sesion' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
